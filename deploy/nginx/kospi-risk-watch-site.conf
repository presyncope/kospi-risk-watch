# Full nginx site template for nukim.dyndns.org.
# Requires valid certificates at /etc/letsencrypt/live/nukim.dyndns.org/.
server {
    listen 80;
    listen [::]:80;
    server_name nukim.dyndns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nukim.dyndns.org;

    ssl_certificate /etc/letsencrypt/live/nukim.dyndns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nukim.dyndns.org/privkey.pem;

    root /var/www/html;
    index index.html;

    location = /kospi-risk-watch {
        return 301 /kospi-risk-watch/;
    }

    location /kospi-risk-watch/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /kospi-risk-watch;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_pass http://127.0.0.1:4173/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
