# Include this inside the HTTPS server block for server_name nukim.dyndns.org.
# The trailing slash on proxy_pass strips /kospi-risk-watch/ before forwarding.
location = /kospi-risk-watch {
    return 301 /kospi-risk-watch/;
}

location /kospi-risk-watch/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /kospi-risk-watch;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_pass http://127.0.0.1:4173/;
}
